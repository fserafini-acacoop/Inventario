function clasif(sys,fis,u){if(sys===""||fis===""||sys==null||fis==null)return{label:"Sin datos",color:"#6b7280",bg:"#f9fafb"};const s=+sys,f=+fis;if(isNaN(s)||isNaN(f))return{label:"Sin datos",color:"#6b7280",bg:"#f9fafb"};const d=f-s;if(d===0)return{label:"OK",color:"#16a34a",bg:"#f0fdf4"};const tipo=d>0?"Sobrante":"Faltante";if(s!==0){const pct=Math.abs(d/s);for(const c of CLASIF)if(pct<=c.max)return{...c,tipo};}return{label:tipo,color:"#dc2626",bg:"#fef2f2"};}

function interpolar(tabla,cm){if(!tabla||!tabla.length)return null;const s=[...tabla].sort((a,b)=>a.cm-b.cm);if(cm<=s[0].cm)return s[0].litros;if(cm>=s[s.length-1].cm)return s[s.length-1].litros;for(let i=0;i<s.length-1;i++){if(cm>=s[i].cm&&cm<=s[i+1].cm){const p=(cm-s[i].cm)/(s[i+1].cm-s[i].cm);return Math.round(s[i].litros+p*(s[i+1].litros-s[i].litros));}}return null;}

// PDF local reader
async function ocrPDF(b64){
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const raw=atob(b64);const arr=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
    const pdf=await pdfjsLib.getDocument({data:arr}).promise;
    const results=[];
    for(let pg=1;pg<=pdf.numPages;pg++){
      const page=await pdf.getPage(pg);const tc=await page.getTextContent();
      const items=tc.items.filter(it=>it.str&&it.str.trim()).map(it=>({t:it.str.trim(),x:it.transform[4],y:it.transform[5],w:it.width||0}));
      const codes=items.filter(it=>/^\d{3,}$/.test(it.t)&&it.x<300);
      for(const code of codes){
        const sameRow=items.filter(it=>Math.abs(it.y-code.y)<4&&it!==code);
        const descItems=sameRow.filter(it=>it.x>code.x+30&&!/^-?[\d.,]+$/.test(it.t)&&!["Kilos","Litros","Garrafa","Sobre","Filtro","Unidad","Pote","Bolson","Gramo","Pack"].includes(it.t)&&!it.t.startsWith("Bls ")&&!it.t.startsWith("Bid ")&&!it.t.startsWith("lata ")&&!it.t.startsWith("tambor"));
        descItems.sort((a,b)=>a.x-b.x);
        const descripcion=descItems.map(it=>it.t).join(" ");
        let stock="";
        let stockItem=sameRow.find(it=>/^-?\d[\d,]*\.\d{4}$/.test(it.t));
        if(stockItem){const sn=parseFloat(stockItem.t.replace(/,/g,""));if(!isNaN(sn))stock=String(Math.round(sn*100)/100);}
        if(!stock){stockItem=sameRow.find(it=>/^-?\d[\d.]*,\d{3}$/.test(it.t));
          if(stockItem){const sv=stockItem.t.replace(/\./g,"").replace(",",".");const sn=parseFloat(sv);if(!isNaN(sn))stock=String(Math.round(sn*100)/100);}}
        if(!descripcion)continue;
        let unidad="Unidad";
        const unitItem=sameRow.find(it=>["Kilos","Litros","Garrafa","Sobre","Filtro","Unidad","Pote","Bolson","Gramo"].includes(it.t)||it.t.startsWith("Bls ")||it.t.startsWith("Bid ")||it.t.startsWith("lata ")||it.t.startsWith("tambor")||it.t.startsWith("Lata "));
        if(unitItem){const u=unitItem.t;if(u==="Kilos"||u==="Gramo")unidad="Kilos";else if(u==="Litros")unidad="Litros";else if(u.startsWith("Bls 25")||u==="Bolson")unidad="Bolsa 25 Kg";else if(u.startsWith("Bls 20"))unidad="Bolsa 20 Kg";else if(u.startsWith("Bls 40"))unidad="Bolsa 25 Kg";else if(u.startsWith("Bls 10")||u.startsWith("Bls 15"))unidad="Bolsa 10 Kg";else if(u==="Pote"||u==="Filtro"||u==="Sobre"||u==="Garrafa"||u==="Unidad")unidad="Unidad";else if(u.startsWith("Bid"))unidad="Bidón";else if(u.startsWith("lata")||u.startsWith("Lata")||u.startsWith("tambor"))unidad="Unidad";
        } else {const dl=descripcion.toLowerCase();if(dl.includes("lts")||dl.includes("litro"))unidad="Litros";else if(dl.includes("kg")||dl.includes("kilo"))unidad="Kilos";}
        let importe="";const stockX=stockItem?stockItem.x:0;
        const importeItems=sameRow.filter(it=>it.x>stockX+60&&/^-?[\d.,]+$/.test(it.t)&&it!==stockItem);importeItems.sort((a,b)=>a.x-b.x);
        if(importeItems.length>0){const iv=importeItems[0].t.replace(/\./g,"").replace(",",".");const in2=parseFloat(iv);if(!isNaN(in2))importe=String(Math.round(in2*100)/100);}
        results.push({codigo:code.t,descripcion,stock,unidad,importe});
      }
    }
    if(!results.length){
      let diag="";try{const page=await pdf.getPage(1);const tc=await page.getTextContent();const its=tc.items.filter(it=>it.str&&it.str.trim());diag="\n\nDiagnóstico: "+its.length+" textos extraídos en pág 1.";if(its.length>0){const codes=its.filter(it=>/^\d{3,}$/.test(it.str.trim()));diag+=" Códigos numéricos: "+codes.length+".";if(codes.length>0)diag+=" Ejemplo: \""+codes[0].str.trim()+"\" en X="+Math.round(codes[0].transform[4]);if(its.length>0&&codes.length===0)diag+=" Primeros textos: "+its.slice(0,5).map(it=>"\""+it.str.trim()+"\"").join(", ");}}catch(ex){}
      throw new Error("No se encontraron productos. Probá cargarlo como CSV."+diag);
    }
    return results;
  } catch(e){
    if(e.message.includes("No se encontraron"))throw e;
    throw new Error("Error procesando PDF: "+e.message+". Probá cargarlo como CSV.");
  }
}

// ═══ SIGNATURE PAD ═══
function SignaturePad({label,value,onChange}){
  const canRef=useRef();const[drawing,setDrawing]=useState(false);
  const getPos=(e)=>{const r=canRef.current.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=(e)=>{e.preventDefault();setDrawing(true);const ctx=canRef.current.getContext("2d");ctx.beginPath();const p=getPos(e);ctx.moveTo(p.x,p.y);};
  const move=(e)=>{if(!drawing)return;e.preventDefault();const ctx=canRef.current.getContext("2d");ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#1e293b";const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();};
  const end=()=>{if(!drawing)return;setDrawing(false);const d=canRef.current.toDataURL("image/png");onChange(d);};
  const clear=()=>{const ctx=canRef.current.getContext("2d");ctx.clearRect(0,0,canRef.current.width,canRef.current.height);onChange(null);};
  useEffect(()=>{if(value&&canRef.current){const img=new Image();img.onload=()=>{canRef.current.getContext("2d").drawImage(img,0,0);};img.src=value;}},[]);
  return html`<div style=${{marginBottom:10}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <label style=${{fontSize:12,fontWeight:700,color:"#475569"}}>${label}</label>
      <button onClick=${clear} style=${{background:"none",border:"1px solid #e2e8f0",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#94a3b8"}}>Limpiar</button>
    </div>
    <canvas ref=${canRef} width=${300} height=${120}
      onMouseDown=${start} onMouseMove=${move} onMouseUp=${end} onMouseLeave=${end}
      onTouchStart=${start} onTouchMove=${move} onTouchEnd=${end}
      style=${{width:"100%",maxWidth:300,height:120,border:"2px solid "+(value?"#16a34a":"#cbd5e1"),borderRadius:10,background:value?"#f0fdf4":"#fafbfc",touchAction:"none",cursor:"crosshair"}} />
    ${value&&html`<div style=${{fontSize:10,color:"#16a34a",marginTop:2}}>✓ Firmado</div>`}
  </div>`;
}

      return html`<div key=${t.id} style=${{border:"1.5px solid #fde68a",borderRadius:12,padding:14,marginBottom:10,background:"#fffbeb"}}>

            <div style=${{display:"flex",gap:16,flexWrap:"wrap"}}>
              <div style=${{flex:1,minWidth:200}}>
                <select value=${firmas.nombreAuditor||""} onChange=${e=>setFirmas(p=>({...p,nombreAuditor:e.target.value}))} style=${{width:"100%",padding:"6px 10px",border:"1.5px solid #cbd5e1",borderRadius:8,fontSize:12,marginBottom:4}}>
                  <option value="">Seleccionar auditor...</option>
                  ${AUDITORES.map(a=>html`<option key=${a} value=${a}>${a}</option>`)}
                </select>
                <${SignaturePad} label="Firma del auditor" value=${firmas.auditor} onChange=${v=>setFirmas(p=>({...p,auditor:v}))} />
              </div>
              <div style=${{flex:1,minWidth:200}}>
                <input value=${firmas.nombreResponsable||""} onInput=${e=>setFirmas(p=>({...p,nombreResponsable:e.target.value}))} placeholder="Nombre del responsable..." style=${{width:"100%",padding:"6px 10px",border:"1.5px solid #cbd5e1",borderRadius:8,fontSize:12,marginBottom:4}} />
                <${SignaturePad} label="Firma del responsable" value=${firmas.responsable} onChange=${v=>setFirmas(p=>({...p,responsable:v}))} />
              </div>
            </div>
          </div>
          <!-- INFORME Y EXPORTACIÓN -->
          <div style=${{background:"#f0f9ff",border:"1.5px solid #93c5fd",borderRadius:12,padding:14,marginTop:16}}>
            <h3 style=${{fontSize:14,fontWeight:700,color:"#1a2e6b",marginBottom:10}}>📊 Informe y exportación</h3>
            <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick=${()=>generarPDF()} style=${{background:"#1a2e6b",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                📝 Generar informe PDF
              </button>
              <button onClick=${()=>exportResultados()} style=${{background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                📊 Exportar resultados (.xlsx)
              </button>
            </div>
            <p style=${{fontSize:10,color:"#94a3b8",marginTop:8}}>El informe genera un HTML con riesgos, recomendaciones y firmas. El Excel exporta diferencias y resumen de la sección actual.</p>
          </div>
          <button onClick=${()=>setTab(1)} style=${{marginTop:10,background:"none",border:"1px solid #cbd5e1",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#475569"}}>← Volver al conteo</button>
        </div>`}
      <//>`}
    <//>`}

    ${csvPrev&&html`<div style=${{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style=${{background:"#fff",borderRadius:14,maxWidth:600,width:"100%",maxHeight:"90vh",overflow:"auto",padding:16,boxShadow:"0 8px 30px rgba(0,0,0,0.3)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style=${{fontSize:16,fontWeight:800,color:"#1a2e6b",margin:0}}>📄 Vista previa: ${csvPrev.fileName}</h3>
          <button onClick=${()=>setCsvPrev(null)} style=${{background:"none",border:"none",fontSize:20,color:"#94a3b8",cursor:"pointer"}}>✕</button>
        </div>
        <p style=${{fontSize:12,color:"#64748b",marginBottom:10}}>${csvPrev.allRows.length} productos encontrados. Asigná cada columna:</p>
        <div style=${{overflowX:"auto",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:12}}>
          <table style=${{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style=${{background:"#eff6ff"}}>${csvPrev.headers.map((h,i)=>html`<th key=${i} style=${{padding:"4px 6px",border:"1px solid #e2e8f0",minWidth:90}}>
              <div style=${{fontSize:10,color:"#94a3b8",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${h}</div>
              <select value=${Object.entries(csvPrev.mapping).find(([k,v])=>v===i)?.[0]||"ignorar"} onChange=${e=>{const field=e.target.value;setCsvPrev(p=>{const m={...p.mapping};Object.keys(m).forEach(k=>{if(m[k]===i)m[k]=-1;});if(field!=="ignorar")m[field]=i;return{...p,mapping:m};});}} style=${{width:"100%",padding:"3px",border:"1.5px solid #93c5fd",borderRadius:4,fontSize:10,fontWeight:600,color:"#1a2e6b",background:"#f0f4ff"}}>
                <option value="ignorar">— Ignorar —</option>
                <option value="codigo">Código</option><option value="descripcion">Descripción</option><option value="stock">Stock</option><option value="unidad">Unidad</option><option value="importe">Importe</option>
              </select>
            </th>`)}</tr></thead>
            <tbody>${csvPrev.rows.slice(0,5).map((row,ri)=>html`<tr key=${ri}>${csvPrev.headers.map((h,ci)=>{const field=Object.entries(csvPrev.mapping).find(([k,v])=>v===ci)?.[0];return html`<td key=${ci} style=${{padding:"3px 6px",border:"1px solid #f1f5f9",fontSize:10,color:field?"#1e293b":"#cbd5e1",fontWeight:field==="descripcion"?600:400,background:field==="stock"?"#fefce8":field==="codigo"?"#f0f4ff":""}}>${row[ci]||""}</td>`})}</tr>`)}</tbody>
          </table>
        </div>
        ${csvPrev.rows.length>5&&html`<p style=${{fontSize:10,color:"#94a3b8",marginBottom:8}}>Mostrando 5 de ${csvPrev.allRows.length} filas...</p>`}
        <div style=${{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick=${()=>setCsvPrev(null)} style=${{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,color:"#475569"}}>Cancelar</button>
          <button onClick=${confirmCSV} disabled=${csvPrev.mapping.descripcion<0} style=${{background:csvPrev.mapping.descripcion>=0?"#1a2e6b":"#94a3b8",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:700}}>Importar ${csvPrev.allRows.length} productos ✓</button>
        </div>
      </div>
    </div>`}
    </div>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body></html>
